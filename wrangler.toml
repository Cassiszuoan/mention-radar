# Cloudflare Workers static-assets deployment for the dashboard SPA.
# The build step (`npm --prefix dashboard run build`) emits dashboard/dist;
# this config serves that directory as a static site. Workers Static Assets is
# Cloudflare's current path (Pages is being folded into Workers).
# `single-page-application` makes any unknown path fall back to index.html so
# client-side routing / deep links work.
name = "mention-radar"
compatibility_date = "2025-06-01"
main = "worker/index.js"

[assets]
directory = "dashboard/dist"
not_found_handling = "single-page-application"
binding = "ASSETS"           # worker serves the SPA via env.ASSETS for non-/api paths

[vars]
# Public values only. SUPABASE_ANON_KEY is public by design (RLS protects data);
# used to verify the caller's Supabase JWT on /api/discover. YT_API_KEY is NOT
# here — set it as an encrypted Worker secret to enable YouTube discovery.
