# Daily batch path: retention / compliance / maintenance (01:17 UTC, off-peak
# minute). Also hosts the keepalive step that defeats GitHub's 60-day
# scheduled-workflow auto-disable on public repos (workflow runs themselves do
# NOT count as repo activity — only commits do).
name: retention

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:

concurrency:
  group: retention
  cancel-in-progress: false

permissions:
  contents: write   # keepalive commits a dummy bump when repo is >45d quiet

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      YT_API_KEY: ${{ secrets.YT_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
      HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: retention + compliance
        run: python -m pipeline.run retention
      - name: keepalive (prevents 60-day cron auto-disable)
        # Inline replacement for gautamkrishnar/keepalive-workflow@v2: GitHub
        # blocks this account from downloading non-first-party actions
        # ("Repository access blocked" at action-download), so do the dummy bump
        # with plain git. An empty commit to the default branch counts as repo
        # activity for ALL scheduled workflows. Fires only when the repo is >45d
        # quiet; best-effort (continue-on-error) so compliance never goes red if
        # the account also restricts Actions write.
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          age_days=$(( ( $(date +%s) - $(git log -1 --format=%ct) ) / 86400 ))
          echo "days since last commit: $age_days"
          if [ "$age_days" -ge 45 ]; then
            git commit --allow-empty -m "chore: keepalive bump (defeat 60d cron auto-disable)"
            git push
          else
            echo "repo active within 45d — keepalive not needed this run"
          fi
